{% extends "base.html" %}

{% block content %}
<style>
    /* Estilos rápidos para forzar que los inputs de Django se adapten al Dark Mode */
    input { width: 100%; padding: 0.75rem; background-color: #121212; border: 1px solid #374151; border-radius: 0.375rem; color: #fff; margin-bottom: 1.25rem; outline: none; }
    input:focus { border-color: #10b981; }
    label { display: block; color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.5rem; font-weight: bold; }
    .helptext { font-size: 0.75rem; color: #6b7280; display: block; margin-top: -1rem; margin-bottom: 1rem; }
    ul.errorlist { color: #ef4444; font-size: 0.875rem; list-style-type: none; padding: 0; margin-bottom: 1rem; }
</style>

<div class="flex justify-center items-center mt-16">
    <div class="bg-[#1e1e1e] p-8 rounded-lg border border-gray-700 shadow-2xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
            <span class="text-[#10b981]">_</span> Acceso al Sistema
        </h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-[#10b981] text-black font-bold py-3 rounded hover:bg-green-400 transition mt-4">
                Iniciar Sesión
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-gray-400">
            ¿No tienes credenciales? <a href="{% url 'register' %}" class="text-[#10b981] hover:underline">Solicitar acceso</a>
        </p>
    </div>
</div>
{% endblock content %}
